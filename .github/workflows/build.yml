name: Build component

# Plain build for wsnrq/foo_discord_rich. The album-art-API change lives in the
# source (foo_discord_rich/discord/discord_impl.cpp) which you commit to the repo;
# this workflow only builds and packs it.
#
# Run: Actions tab -> "Build component" -> Run workflow. When it finishes,
# open the run and download the "foo_discord_rich" artifact (the .fb2k-component).

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Python deps
        run: py -3 -m pip install semver

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Prepare project (submodules + generated headers)
        run: py -u scripts/setup.py

      - name: Fix upstream submodule bug (invalid 'throw std::out_of_range;')
        shell: bash
        run: |
          f=submodules/fb2k_utils/src/qwr/pfc_helpers_cnt.h
          if [ -f "$f" ]; then
            sed -i 's/throw std::out_of_range;/throw std::out_of_range( "index out of range" );/g' "$f"
            grep -n "out_of_range" "$f" || true
          fi

      - name: Fix upstream missing includes (newer MSVC no longer pulls them in)
        shell: bash
        run: |
          f=foo_discord_rich/stdafx.h
          grep -q '#include <chrono>' "$f" || sed -i 's|#include <string>|#include <string>\n#include <chrono>\n#include <thread>|' "$f"
          grep -nE "#include <(string|chrono|thread)>" "$f"

      - name: Stub bundled-uploader binaries (skip Go build; not used)
        shell: bash
        run: |
          mkdir -p foo_discord_rich/resources
          : > foo_discord_rich/resources/drp_artwork_uploader_windows_386.exe
          : > foo_discord_rich/resources/drp_artwork_uploader_windows_amd64.exe

      - name: NuGet restore
        run: nuget restore workspaces/foo_discord_rich.sln

      - name: Build Win32 (Release)
        run: msbuild workspaces/foo_discord_rich.sln /p:Configuration=Release /p:Platform=Win32 /m /verbosity:minimal

      - name: Build x64 (Release)
        run: msbuild workspaces/foo_discord_rich.sln /p:Configuration=Release /p:Platform=x64 /m /verbosity:minimal

      - name: Pack component
        run: py scripts/pack_component.py

      - name: Upload component
        uses: actions/upload-artifact@v4
        with:
          name: foo_discord_rich
          path: _result/**/foo_discord_rich*.fb2k-component
          if-no-files-found: error
